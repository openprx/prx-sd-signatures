# PRX-SD Signatures Sync Configuration
# Enable/disable individual sources and set sync parameters
#
# Format: SOURCE_ENABLED=true|false
# Disable sources you don't need to reduce bandwidth/storage

# ═══════════════════════════════════════════════════
# Hash Sources
# ═══════════════════════════════════════════════════

# abuse.ch MalwareBazaar — Recent malware SHA-256 (last 48h)
MALWAREBAZAAR_ENABLED=true
MALWAREBAZAAR_URL="https://bazaar.abuse.ch/export/txt/sha256/recent/"

# abuse.ch URLhaus — Malware payload SHA-256 from malicious URLs
URLHAUS_ENABLED=true
URLHAUS_URL="https://urlhaus.abuse.ch/downloads/payloads/"

# abuse.ch Feodo Tracker — Banking trojan SHA-256
FEODO_ENABLED=true
FEODO_URL="https://feodotracker.abuse.ch/downloads/malware_hashes.csv"

# abuse.ch ThreatFox — IOC SHA-256
THREATFOX_ENABLED=true
THREATFOX_URL="https://threatfox.abuse.ch/export/json/md5/recent/"

# abuse.ch SSL Blacklist — Malicious SSL certificate SHA1
SSLBL_ENABLED=true
SSLBL_URL="https://sslbl.abuse.ch/blacklist/sslblacklist.csv"

# VirusShare — Bulk MD5 hash lists (large download, 20M+ hashes)
VIRUSSHARE_ENABLED=false
VIRUSSHARE_LIST_START=495
VIRUSSHARE_LIST_END=499

# ═══════════════════════════════════════════════════
# YARA Rule Sources (GitHub repos)
# ═══════════════════════════════════════════════════

# Icewater — 16,432 YARA rules
ICEWATER_ENABLED=true
ICEWATER_REPO="https://github.com/SupportIntelligence/Icewater.git"

# Neo23x0/signature-base — High-quality APT/crime rules
SIGNATURE_BASE_ENABLED=true
SIGNATURE_BASE_REPO="https://github.com/Neo23x0/signature-base.git"

# Yara-Rules/rules — Largest community YARA library
YARA_RULES_ENABLED=true
YARA_RULES_REPO="https://github.com/Yara-Rules/rules.git"

# Elastic protections-artifacts — Enterprise endpoint YARA
ELASTIC_ENABLED=true
ELASTIC_REPO="https://github.com/elastic/protections-artifacts.git"

# Google GCTI — Google threat intelligence YARA (archived)
GCTI_ENABLED=true
GCTI_REPO="https://github.com/chronicle/GCTI.git"

# ReversingLabs — Commercial-grade open YARA
REVERSINGLABS_ENABLED=true
REVERSINGLABS_REPO="https://github.com/reversinglabs/reversinglabs-yara-rules.git"

# ESET IOC — APT tracking YARA
ESET_ENABLED=true
ESET_REPO="https://github.com/eset/malware-ioc.git"

# InQuest — Document malware YARA
INQUEST_ENABLED=true
INQUEST_REPO="https://github.com/InQuest/yara-rules.git"

# ═══════════════════════════════════════════════════
# ClamAV Official Database
# ═══════════════════════════════════════════════════

CLAMAV_ENABLED=true
CLAMAV_MIRROR="https://database.clamav.net"

# ═══════════════════════════════════════════════════
# IOC Feeds (IP/Domain/URL blocklists)
# ═══════════════════════════════════════════════════

# IPsum — Aggregated malicious IP feed (30+ sources)
IPSUM_ENABLED=true
IPSUM_URL="https://raw.githubusercontent.com/stamparm/ipsum/master/ipsum.txt"

# FireHOL IP Lists — level1 (worst offenders)
FIREHOL_ENABLED=true
FIREHOL_URL="https://iplists.firehol.org/files/firehol_level1.netset"

# Emerging Threats — Compromised IPs
ET_COMPROMISED_ENABLED=true
ET_COMPROMISED_URL="https://rules.emergingthreats.net/blockrules/compromised-ips.txt"

# SANS suspicious domains
SANS_ENABLED=true
SANS_URL="https://isc.sans.edu/feeds/suspiciousdomains_High.txt"

# Abuse.ch URLhaus malicious URLs
URLHAUS_URLS_ENABLED=true
URLHAUS_URLS_URL="https://urlhaus.abuse.ch/downloads/text_recent/"

# ═══════════════════════════════════════════════════
# Sync Settings
# ═══════════════════════════════════════════════════

# Maximum download time per source (seconds)
DOWNLOAD_TIMEOUT=120

# Git clone depth (reduce bandwidth)
GIT_DEPTH=1

# Keep previous versions (for diffing)
KEEP_PREVIOUS=false
